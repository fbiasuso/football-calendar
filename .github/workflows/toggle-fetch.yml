name: Toggle Data Fetch

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Pausar o reanudar el fetching automático'
        required: true
        type: choice
        options:
          - pause
          - resume

jobs:
  toggle:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set variable and write status
        run: |
          if [ "${{ inputs.action }}" = "pause" ]; then
            gh variable set DATA_FETCH_PAUSED --body true
            echo '{"dataFetchPaused":true}' > data/status.json
          else
            gh variable set DATA_FETCH_PAUSED --body false
            echo '{"dataFetchPaused":false}' > data/status.json
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Deploy status to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./data
          destination_dir: ./data
          keep_files: true
